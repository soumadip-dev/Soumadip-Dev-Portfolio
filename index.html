<!DOCTYPE html>

        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Soumadip Majila",
        "url": "https://soumadip.vercel.app",
        "image": "https://soumadip.vercel.app/images/profile.png",
        "jobTitle": "Full-Stack Developer",
        "worksFor": {
          "@type": "Organization",
          "name": "Self-Employed"
        },
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourusername",

          "Full-Stack Development"
        ]
      }

    <!-- Additional structured data for portfolio -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "description": "Portfolio of Soumadip Majila - Full-Stack Developer & Software Engineer",

          "name": "Soumadip Majila"

          "target": "https://soumadip.vercel.app/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Additional SEO -->
